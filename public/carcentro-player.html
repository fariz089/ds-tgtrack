<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCTV — CarCentro</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#111;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;width:100vw;height:100vh;}
    #loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#111;z-index:100;}
    .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#0066a1;border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loading .status{margin-top:14px;font-size:13px;color:#888;}
    #header{position:fixed;top:0;left:0;right:0;height:36px;background:rgba(0,0,0,.85);display:flex;align-items:center;padding:0 12px;z-index:50;gap:8px;backdrop-filter:blur(6px);}
    #header .title{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    #header .badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;text-transform:uppercase;}
    #header .badge.live{background:#22c55e;color:#fff;}
    #header .badge.loading{background:#f59e0b;color:#000;}
    #portal-frame{position:fixed;top:36px;left:0;right:0;bottom:0;width:100%;height:calc(100vh - 36px);border:none;background:#000;}
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="status" id="loadStatus">Memuat CarCentro portal...</div>
  </div>
  <div id="header" style="display:none;">
    <div class="title" id="headerTitle">CarCentro CCTV</div>
    <div class="badge loading" id="headerBadge">LOADING</div>
  </div>
  <iframe id="portal-frame" style="display:none;"></iframe>
  <script>
    var params = new URLSearchParams(window.location.search);
    var VEHICLE_NAME = decodeURIComponent(params.get('name') || 'CCTV');
    var CHANNEL = params.get('channel') || '1';
    var $loading = document.getElementById('loading');
    var $loadStatus = document.getElementById('loadStatus');
    var $header = document.getElementById('header');
    var $headerTitle = document.getElementById('headerTitle');
    var $headerBadge = document.getElementById('headerBadge');
    var $frame = document.getElementById('portal-frame');

    $headerTitle.textContent = VEHICLE_NAME + ' — CH' + CHANNEL;

    fetch('/cc-proxy/login').then(function(r){ return r.json(); }).then(function(d){
      console.log('[CC] Login:', d.ok ? 'OK' : 'FAIL');
      $loadStatus.textContent = 'Memuat portal...';
      $frame.src = '/cc-proxy/portal';
      $frame.onload = function(){
        $loading.style.display = 'none';
        $header.style.display = 'flex';
        $frame.style.display = 'block';
        $headerBadge.textContent = 'LIVE';
        $headerBadge.className = 'badge live';
      };
    }).catch(function(e){
      $loadStatus.textContent = 'Login gagal, memuat portal...';
      $frame.src = '/cc-proxy/portal';
      $frame.onload = function(){
        $loading.style.display = 'none';
        $header.style.display = 'flex';
        $frame.style.display = 'block';
      };
    });
  </script>
</body>
</html>
