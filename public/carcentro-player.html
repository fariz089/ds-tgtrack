<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCTV — CarCentro</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#1a1a2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}
    #loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;z-index:1000;}
    .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#0066a1;border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loading .status{margin-top:14px;font-size:13px;color:#888;}
    #loading .sub{margin-top:6px;font-size:11px;color:#555;}
    #error{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;z-index:1000;}
    #error .icon{font-size:40px;margin-bottom:14px;}
    #error .msg{font-size:14px;color:#999;margin-bottom:16px;text-align:center;max-width:320px;}
    #error button{padding:8px 20px;background:#0066a1;color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px;}

    /* Player area */
    #player-area{width:100vw;height:100vh;position:relative;display:none;}

    /* Header bar */
    #header{position:absolute;top:0;left:0;right:0;height:40px;background:rgba(0,0,0,.7);display:flex;align-items:center;padding:0 12px;z-index:10;gap:10px;}
    #header .title{font-size:13px;font-weight:600;flex:1;}
    #header .badge{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600;}
    #header .badge.live{background:#22c55e;color:#fff;}
    #header .badge.loading{background:#f59e0b;color:#000;}
    #header .badge.error{background:#ef4444;color:#fff;}

    /* DVR player container — the AoooG scripts will render canvases here */
    #dvr-container{width:100%;height:100%;padding-top:40px;}
    #dvr-container canvas{display:block;}
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="status" id="loadStatus">Initializing...</div>
    <div class="sub" id="loadSub"></div>
  </div>

  <div id="error">
    <div class="icon">⚠️</div>
    <div class="msg" id="errorMsg"></div>
    <button onclick="location.reload()">Coba Lagi</button>
  </div>

  <div id="player-area">
    <div id="header">
      <div class="title" id="headerTitle">CarCentro CCTV</div>
      <div class="badge loading" id="headerBadge">LOADING</div>
    </div>
    <div id="dvr-container"></div>
  </div>

  <script>
    // ── Parse URL params ──
    const params = new URLSearchParams(window.location.search);
    const IMEI = params.get('imei') || '';
    const DEVICE_ID = parseInt(params.get('deviceId') || '0');
    const CHANNEL = parseInt(params.get('channel') || '1');
    const VEHICLE_NAME = decodeURIComponent(params.get('name') || 'CCTV');

    // All requests go through our reverse proxy (same origin = no mixed content)
    const PROXY_BASE = '/cc-proxy';
    const API_BASE = PROXY_BASE;
    const WS_PROTOCOL = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const WS_URL = `${WS_PROTOCOL}//${window.location.host}${PROXY_BASE}/ws`;

    const $loading = document.getElementById('loading');
    const $loadStatus = document.getElementById('loadStatus');
    const $loadSub = document.getElementById('loadSub');
    const $error = document.getElementById('error');
    const $errorMsg = document.getElementById('errorMsg');
    const $playerArea = document.getElementById('player-area');
    const $headerTitle = document.getElementById('headerTitle');
    const $headerBadge = document.getElementById('headerBadge');

    function showError(msg) {
      $loading.style.display = 'none';
      $error.style.display = 'flex';
      $errorMsg.textContent = msg;
    }

    function showPlayer() {
      $loading.style.display = 'none';
      $playerArea.style.display = 'block';
    }

    function setBadge(text, type) {
      $headerBadge.textContent = text;
      $headerBadge.className = 'badge ' + type;
    }

    // ── Step 1: Login via proxy ──
    async function login() {
      $loadStatus.textContent = 'Login ke CarCentro...';
      try {
        const resp = await fetch(`${API_BASE}/login`);
        if (!resp.ok) throw new Error(`Login HTTP ${resp.status}`);
        const data = await resp.json();
        console.log('[CC-Player] Login OK');
        return data;
      } catch (err) {
        console.error('[CC-Player] Login error:', err);
        throw err;
      }
    }

    // ── Step 2: Get video config ──
    async function getVideoConfig() {
      $loadStatus.textContent = 'Getting camera config...';
      try {
        const resp = await fetch(`${API_BASE}/video-config/${DEVICE_ID}`);
        if (!resp.ok) throw new Error(`Config HTTP ${resp.status}`);
        const data = await resp.json();
        console.log('[CC-Player] Video config:', data);
        return data;
      } catch (err) {
        console.warn('[CC-Player] Video config error:', err);
        return null;
      }
    }

    // ── Step 3: Load AoooG DVR scripts via proxy ──
    function loadScript(path) {
      return new Promise((resolve) => {
        const s = document.createElement('script');
        s.src = `${PROXY_BASE}/assets/aooog/script/${path}`;
        s.onload = resolve;
        s.onerror = () => { console.warn('[CC-Player] Script failed:', path); resolve(); };
        document.body.appendChild(s);
      });
    }

    async function loadDvrScripts() {
      $loadStatus.textContent = 'Loading DVR player...';
      $loadSub.textContent = 'Downloading decoder & player scripts';

      const scripts = [
        'Maintenance/Dvr/protobuf.min.js',
        'Maintenance/Dvr/probuf.js',
        'Maintenance/Dvr/DvrCommon.js',
        'Maintenance/Dvr/webgl.js',
        'Maintenance/Dvr/audio_src/std.js',
        'Maintenance/Dvr/audio_src/pcm_player.js',
        'Maintenance/Dvr/audio_src/g726.js',
        'Maintenance/Dvr/audio_src/g711.js',
        'Maintenance/Dvr/decoder.js',
        'Maintenance/Dvr/Dvr_Player.js',
        'Maintenance/h265/lib/h265-player.cjs.js',
        'Maintenance/DvrPlayer.js',
      ];

      for (let i = 0; i < scripts.length; i++) {
        $loadSub.textContent = `(${i+1}/${scripts.length}) ${scripts[i].split('/').pop()}`;
        await loadScript(scripts[i]);
      }
      console.log('[CC-Player] All scripts loaded');
    }

    // ── Step 4: Init player ──
    async function initPlayer(videoConfig) {
      $loadStatus.textContent = 'Starting stream...';
      $loadSub.textContent = `${VEHICLE_NAME} — Channel ${CHANNEL}`;

      $headerTitle.textContent = `${VEHICLE_NAME} — CH${CHANNEL}`;
      showPlayer();
      setBadge('CONNECTING', 'loading');

      // Try various AoooG player constructors
      const container = document.getElementById('dvr-container');

      try {
        if (typeof window.DvrPlayer === 'function') {
          console.log('[CC-Player] Using DvrPlayer');
          const player = new window.DvrPlayer({
            container: container,
            imei: IMEI,
            channel: CHANNEL,
            wsUrl: WS_URL,
            deviceId: DEVICE_ID,
            autoPlay: true,
          });
          setBadge('LIVE', 'live');
          return;
        }

        if (typeof window.Dvr_Player === 'function') {
          console.log('[CC-Player] Using Dvr_Player');
          new window.Dvr_Player(container, { imei: IMEI, channel: CHANNEL, type: 'live' });
          setBadge('LIVE', 'live');
          return;
        }

        // If no known constructor, try to find anything the scripts exposed
        const candidates = ['createDvrPlayer', 'createPlayer', 'VideoPlayer'];
        for (const name of candidates) {
          if (typeof window[name] === 'function') {
            console.log(`[CC-Player] Using ${name}`);
            window[name](container, IMEI, CHANNEL);
            setBadge('LIVE', 'live');
            return;
          }
        }

        console.warn('[CC-Player] No player constructor found');
        setBadge('NO PLAYER', 'error');
      } catch (err) {
        console.error('[CC-Player] Player init error:', err);
        setBadge('ERROR', 'error');
      }
    }

    // ── Main ──
    async function main() {
      if (!IMEI || !DEVICE_ID) {
        showError('Missing parameters (imei/deviceId)');
        return;
      }

      try {
        await login();
        const config = await getVideoConfig();
        await loadDvrScripts();
        await initPlayer(config);
      } catch (err) {
        showError(`Error: ${err.message}`);
      }
    }

    main();
  </script>
</body>
</html>
