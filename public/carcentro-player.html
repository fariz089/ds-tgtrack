<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCTV — CarCentro</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#1a1a2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;width:100vw;height:100vh;}
    #loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;z-index:100;}
    .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#0066a1;border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loading .status{margin-top:14px;font-size:13px;color:#888;}
    #loading .sub{margin-top:6px;font-size:11px;color:#555;}
    #portal-frame{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;border:none;background:#000;display:none;}
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="status" id="loadStatus">Menghubungkan ke CarCentro...</div>
    <div class="sub" id="loadSub"></div>
  </div>
  <iframe id="portal-frame"></iframe>
  <script>
    var params = new URLSearchParams(window.location.search);
    var VEHICLE_NAME = decodeURIComponent(params.get('name') || 'CCTV');
    var $loading = document.getElementById('loading');
    var $status = document.getElementById('loadStatus');
    var $sub = document.getElementById('loadSub');
    var $frame = document.getElementById('portal-frame');

    // Step 1: Get auth data from server
    $status.textContent = 'Login ke CarCentro...';

    fetch('/cc-proxy/login-data')
      .then(function(r){ return r.json(); })
      .then(function(data) {
        if (!data.ok) throw new Error(data.error || 'Login failed');

        $status.textContent = 'Setting session...';
        $sub.textContent = 'Preparing cookies';

        // Step 2: Set cookies on the proxy domain (same origin = works!)
        // These are the cookies the CarCentro portal checks
        var cookies = data.cookies;
        for (var i = 0; i < cookies.length; i++) {
          document.cookie = cookies[i].name + '=' + encodeURIComponent(cookies[i].value) + '; path=/cc-proxy; SameSite=Lax';
        }

        $status.textContent = 'Memuat portal...';
        $sub.textContent = VEHICLE_NAME;

        // Step 3: Load portal iframe
        $frame.src = '/cc-proxy/portal';

        $frame.onload = function() {
          $loading.style.display = 'none';
          $frame.style.display = 'block';
        };

        // Timeout fallback
        setTimeout(function() {
          if ($loading.style.display !== 'none') {
            $loading.style.display = 'none';
            $frame.style.display = 'block';
          }
        }, 15000);
      })
      .catch(function(err) {
        $status.textContent = 'Login gagal: ' + err.message;
        $sub.textContent = 'Membuka portal tanpa auto-login...';
        setTimeout(function() {
          $frame.src = '/cc-proxy/portal';
          $frame.onload = function() {
            $loading.style.display = 'none';
            $frame.style.display = 'block';
          };
        }, 1000);
      });
  </script>
</body>
</html>
